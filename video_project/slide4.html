<!DOCTYPE html>
<html>
<head>
<style>
body {
    background-color: #1e1e1e;
    color: #ffffff;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    text-align: center;
}
h1 { font-size: 80px; margin-bottom: 20px; color: #E91E63; }
.emoji { font-size: 120px; margin-bottom: 40px; animation: bounce 2s infinite; }
@keyframes bounce {
  0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
  40% {transform: translateY(-30px);}
  60% {transform: translateY(-15px);}
}
</style>
</head>
<body>
    <div class="emoji">🚀</div>
    <h1>准备就绪</h1>
    <h2>让我们开始吧！</h2>
</body>
</html>
