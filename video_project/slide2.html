<!DOCTYPE html>
<html>
<head>
<style>
body {
    background-color: #1e1e1e;
    color: #ffffff;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    text-align: center;
}
h1 { font-size: 60px; margin-bottom: 40px; color: #2196F3; }
.grid { display: flex; gap: 50px; }
.item { display: flex; flex-direction: column; align-items: center; }
.icon { font-size: 80px; margin-bottom: 20px; }
.label { font-size: 30px; }
</style>
</head>
<body>
    <h1>全能助手</h1>
    <div class="grid">
        <div class="item"><div class="icon">💻</div><div class="label">写代码</div></div>
        <div class="item"><div class="icon">🔍</div><div class="label">查资料</div></div>
        <div class="item"><div class="icon">⚙️</div><div class="label">管系统</div></div>
    </div>
</body>
</html>
